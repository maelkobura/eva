# Configuration file for Eva Node
version: 1.0.0
platform: .NET

logging:
  level: Information
  
debug:
  skip-tls: false
  authentification:
    skip: false
  
authentification:
  token: "no token"
  
network:
  self:
    port: 8080
  
eas:
  main:
    host: localhost
    port: 8080
    tls: true
  backup:
    host: localhost
    port: 8080
    tls: true
    
nodes:
  max-connection: 0 # 0 = infinite
  