syntax = "proto3";

option csharp_namespace = "Eva.Commons.Messages";

message EvaParameterDescriptor {
  string name = 1;
  ReturnType type = 2;
  bool is_required = 3;
}

enum EvaType {
  OBJECT = 0;
  STRING = 1;
  INT32 = 2;
  INT64 = 3;
  BOOLEAN = 4;
  ARRAY = 5;
  FLOAT = 6;
  DOUBLE = 7;
  BYTES = 8;
  TIMESTAMP = 9;
}

message ReturnType {
  EvaType type = 1;
  optional EvaType array_type = 2;
  optional string object_name = 3;
}

message EvaFunctionDescriptor {
  string id = 1; // Function UniqueID
  string name = 2; // Function name
  string description = 3; // Function description
  repeated string keywords = 4; // Function keyword for tool search engine
  repeated string authorization = 5; // Required AND permission for use the function
  repeated EvaParameterDescriptor parameters = 6; // Function parameters
  ReturnType return_type = 7; // Return type
  optional int32 weight = 8; // Function weight (higher = more heavy to run and more time needed)
  bool depreciated = 9; // If function is depreciated
  repeated string flags = 10; // Function flags (e.g. model:hidden, service:hidden, client:desktop, etc.)
}

message FunctionPanel {
  string service_id = 1;
  repeated EvaFunctionDescriptor functions = 2;
  repeated FunctionPanel sub_services = 3;
  string version = 4;
}

message InvokeRequest {
  string caller_id = 1;
  map<string, bytes> parameters = 2;
}

message InvokeResponse {
  bool success = 1;
  bytes result = 2;
  optional string error = 3;
}