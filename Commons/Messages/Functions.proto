syntax = "proto3";

option csharp_namespace = "Eva.Commons.Messages";

message EvaParameterDescriptor {
  string name = 1;
  ReturnType type = 2;
  bool is_required = 3;
}

enum EvaType {
  OBJECT = 0;
  STRING = 1;
  INT32 = 2;
  INT64 = 3;
  BOOLEAN = 4;
  ARRAY = 5;
  FLOAT = 6;
  DOUBLE = 7;
  BYTES = 8;
  TIMESTAMP = 9;
}

message ReturnType {
  EvaType type = 1;
  optional EvaType array_type = 2;
  optional string object_name = 3;
}

message EvaFunctionDescriptor {
  string id = 1;          // Guid généré côté serveur au moment de la sérialisation
  string name = 2;
  string description = 3;
  repeated string keywords = 4;
  repeated string authorization = 5;
  repeated EvaParameterDescriptor parameters = 6;
  ReturnType return_type = 7; // idem, nom du type C# en string
}

message FunctionPanel {
  string service_id = 1;
  repeated EvaFunctionDescriptor functions = 2;
  repeated FunctionPanel sub_services = 3;
  string version = 4;
}

message InvokeRequest {
  string caller_id = 1;
  map<string, bytes> parameters = 2;
}

message InvokeResponse {
  bool success = 1;
  bytes result = 2;
  optional string error = 3;
}